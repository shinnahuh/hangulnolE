<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>초롱유치원 한글 블록</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; display: flex; flex-direction: column; align-items: center; background: #fdfdfd; margin: 0; }
        .btn-game { padding: 15px; margin: 5px; background: #FFCC00; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; }
        #view-area { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .card { border: 1px solid #ddd; padding: 15px; margin: 10px; border-radius: 20px; background: white; cursor: pointer; text-align: center; }
        #friend-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
    </style>
</head>
<body>
    <div id="view-area">
        <h1>우리 반 한글 블록</h1>
        <div id="controls">
            <button class="btn-game" onclick="addFolder()">➕ 반 만들기</button>
            <button class="btn-game" onclick="document.getElementById('file-import').click()">📂 파일 불러오기</button>
            <button class="btn-game" onclick="saveAll()">💾 파일 저장</button>
        </div>
        <input type="file" id="file-import" style="display:none" accept=".txt">
        <div id="friend-list"></div>
    </div>

    <script>
        // 1. 데이터 불러오기 (백화현상 방지)
        let totalData = {};
        try {
            const saved = localStorage.getItem('my_class_data');
            totalData = saved ? JSON.parse(saved) : {};
        } catch(e) { totalData = {}; }

        // 2. 반 만들기
        function addFolder() {
            let name = prompt("반 이름을 입력하세요 (예: 햇살반)");
            if(name) { totalData[name] = []; render(); }
        }

        // 3. 화면 그리기
        function render() {
            const list = document.getElementById('friend-list');
            list.innerHTML = '';
            Object.keys(totalData).forEach(folder => {
                let div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<h3>📁 ${folder}</h3>`;
                div.onclick = () => alert(folder + " 폴더 진입!"); // 이곳에 폴더 진입 로직 연결
                list.appendChild(div);
            });
        }

        // 4. 저장 및 불러오기
        function saveAll() {
            const blob = new Blob([JSON.stringify(totalData)], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'my_class.txt';
            a.click();
        }

        document.getElementById('file-import').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                totalData = JSON.parse(ev.target.result);
                render();
            };
            reader.readAsText(e.target.files[0]);
        };

        render();
    </script>
</body>
</html>
