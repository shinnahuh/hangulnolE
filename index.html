<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>초롱유치원 한글 놀이</title>
    <style>
        body { background: #fdfdfd; margin: 0; overflow: hidden; touch-action: none; font-family: 'Apple SD Gothic Neo', sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        /* 1. 초기 친구 선택 화면 스타일 */
        #start-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #f5f7fa; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; overflow-y: auto; padding-top: 40px; box-sizing: border-box; }
        #start-screen h1 { font-size: 40px; color: #333; margin-bottom: 20px; font-weight: 900; }
        
        /* 상단 버튼 그룹 */
        .start-btn-group { display: flex; gap: 15px; margin-bottom: 20px; }
        .btn-add-friend { background: #34C759; color: white; padding: 12px 24px; font-size: 18px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(52, 199, 89, 0.3); }
        .btn-direct-input { background: #007AFF; color: white; padding: 12px 24px; font-size: 18px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0, 122, 255, 0.3); }
        
        .friend-list { display: flex; gap: 25px; flex-wrap: wrap; justify-content: center; max-width: 1100px; padding: 20px; padding-bottom: 100px; }
        .friend-card { width: 180px; background: white; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); padding: 15px; text-align: center; cursor: pointer; transition: transform 0.2s; border: 3px solid transparent; position: relative; }
        .friend-card:hover { transform: scale(1.05); border-color: #007AFF; }
        .friend-card img { width: 140px; height: 140px; border-radius: 15px; object-fit: cover; background: #eee; margin-bottom: 10px; }
        .friend-card span { font-size: 24px; font-weight: 800; color: #333; }

        /* 카드 삭제 버튼 (X) */
        .btn-delete-card { position: absolute; top: -10px; right: -10px; width: 30px; height: 30px; background: #FF3B30; color: white; border-radius: 50%; border: none; font-weight: bold; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }

        /* 2. 게임 화면 스타일 */
        #menu { margin-top: 20px; display: flex; gap: 10px; align-items: center; z-index: 100; }
        #hint-box { display: flex; align-items: center; gap: 15px; background: #fff; padding: 10px 30px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        #current-photo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; display: none; background: #eee; }
        #hint { font-size: 40px; font-weight: 900; color: #333; letter-spacing: 10px; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); }
        .btn-reset { background: #ffcc00; color: #333; }
        .btn-change { background: #007AFF; color: white; }
        .btn-home { background: #aeaeae; color: white; }

        /* 조립 판 */
        #drop-zone { display: flex; gap: 30px; margin-top: 40px; min-height: 300px; }
        .char-box { width: 250px; height: 250px; border: 4px solid #f0f0f0; background: white; position: relative; border-radius: 30px; }

        /* 자모 조각 */
        .jamo { position: absolute; font-size: 100px; font-weight: 900; color: #444; cursor: grab; user-select: none; line-height: 1; z-index: 50; padding: 10px; }
        .jamo.in-box { color: #007AFF; z-index: 40; }

        /* 하단 보관함 */
        #bin { width: 100%; height: 200px; background: #f9f9f9; border-top: 2px solid #eee; position: fixed; bottom: 0; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 15px; padding: 20px; }
        .jamo.ready { position: static; font-size: 80px; background: white; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        /* 유치원 로고 */
        #logo { position: fixed; bottom: 20px; right: 20px; width: 150px; height: auto; opacity: 0.8; pointer-events: none; }
        
        /* 숨겨진 파일 인풋 */
        #file-input { display: none; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>누구 이름을 만들어볼까?</h1>
        <div class="start-btn-group">
            <button class="btn-add-friend" onclick="triggeraddFriend()">➕ 새 친구 추가하기</button>
            <button class="btn-direct-input" onclick="triggerDirectInput()">✏️ 글자 직접 입력하기</button>
        </div>
        <input type="file" id="file-input" accept="image/*" capture="user">
        <div class="friend-list" id="friend-list"></div>
    </div>

    <div id="menu">
        <button class="btn btn-home" onclick="goHome()">🏠 처음으로</button>
        <button class="btn btn-reset" onclick="resetGame()">♻️ 다시하기</button>
        <div id="hint-box">
            <img id="current-photo" src="" alt="친구 사진">
            <div id="hint">이름</div>
        </div>
        <button class="btn btn-change" onclick="changeName()">✏️ 직접 쓰기</button>
