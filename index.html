<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>초롱 한글 블록</title>
    <style>
        body { background: #fdfdfd; margin: 0; font-family: 'Apple SD Gothic Neo', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .nav { width: 100%; padding: 20px; display: flex; justify-content: center; gap: 10px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn { padding: 10px 20px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; color: white; }
        #view { width: 100%; max-width: 1000px; padding: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .card { width: 160px; padding: 20px; background: #FFCC00; border-radius: 30px; text-align: center; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 204, 0, 0.3); }
        .card img { width: 100px; height: 100px; border-radius: 20px; object-fit: cover; }
        #game-area { display: none; width: 100%; flex-direction: column; align-items: center; padding: 20px; }
        .drop-zone { display: flex; gap: 15px; margin: 30px 0; }
        .char-box { width: 120px; height: 120px; border: 4px dashed #ccc; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 60px; }
        #bin { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; padding: 20px; background: #eee; width: 100%; }
        .jamo { width: 80px; height: 80px; background: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 40px; cursor: grab; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="nav">
        <button class="btn" style="background:#FF9500" onclick="addFolder()">반 추가</button>
        <button class="btn" style="background:#007AFF" onclick="triggerDirectInput()">직접 쓰기</button>
        <button class="btn" style="background:#34C759" onclick="exportData()">데이터 내보내기</button>
        <button class="btn" style="background:#8E8E93" onclick="document.getElementById('file-in').click()">파일 불러오기</button>
        <input type="file" id="file-in" style="display:none" accept=".txt">
    </div>

    <div id="view"></div>

    <div id="game-area">
        <button class="btn" style="background:#aaa" onclick="location.reload()">홈으로</button>
        <div id="drop-zone" class="drop-zone"></div>
        <div id="bin"></div>
    </div>

    <script>
        let allData = JSON.parse(localStorage.getItem('my_class') || '{"우리반": []}');
        let currentClass = "";

        function renderFolders() {
            const view = document.getElementById('view');
            view.innerHTML = '';
            Object.keys(allData).forEach(name => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<h3>📁 ${name}</h3>`;
                div.onclick = () => { currentClass = name; showFriends(); };
                view.appendChild(div);
            });
        }

        function showFriends() {
            const view = document.getElementById('view');
            view.innerHTML = '<button class="btn" style="background:#34C759" onclick="addFriend()">📸 친구 추가</button>';
            allData[currentClass].forEach(f => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<img src="${f.photo}"><div>${f.name}</div>`;
                div.onclick = () => initGame(f.name, f.photo);
                view.appendChild(div);
            });
        }

        function addFolder() {
            const name = prompt("반 이름:");
            if(name) { allData[name] = []; localStorage.setItem('my_class', JSON.stringify(allData)); renderFolders(); }
        }

        function addFriend() {
            const name = prompt("친구 이름:");
            if(!name) return;
            const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
            input.onchange = (e) => {
                const reader = new FileReader();
                reader.onload = (ev) => { allData[currentClass].push({name, photo: ev.target.result}); localStorage.setItem('my_class', JSON.stringify(allData)); showFriends(); };
                reader.readAsDataURL(e.target.files[0]);
            };
            input.click();
        }

        function triggerDirectInput() {
            const name = prompt("글자 입력:");
            if(name) initGame(name, "");
        }

        function initGame(name, photo) {
            document.querySelector('.nav').style.display = 'none';
            document.getElementById('view').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            
            const dz = document.getElementById('drop-zone');
            dz.innerHTML = '';
            for(let char of name) {
                const box = document.createElement('div');
                box.className = 'char-box';
                box.innerText = char;
                dz.appendChild(box);
            }
            
            // 단순화된 게임 로직 (선생님의 드래그앤드롭 복구용 기본)
            const bin = document.getElementById('bin');
            bin.innerHTML = '';
            name.split('').forEach(c => {
                const jamo = document.createElement('div');
                jamo.className = 'jamo';
                jamo.innerText = c;
                jamo.draggable = true;
                bin.appendChild(jamo);
            });
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(allData)], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'data.json'; a.click();
        }

        document.getElementById('file-in').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => { allData = JSON.parse(ev.target.result); localStorage.setItem('my_class', JSON.stringify(allData)); renderFolders(); };
            reader.readAsText(e.target.files[0]);
        };

        renderFolders();
    </script>
</body>
</html>
