<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>한글 블록</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .btn { padding: 20px; margin: 10px; background: #FFCC00; border: none; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #friend-list { display: flex; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        .card { border: 1px solid #ddd; padding: 15px; margin: 10px; border-radius: 15px; text-align: center; }
    </style>
</head>
<body>
    <h1>우리 반 친구들</h1>
    <div id="controls">
        <button class="btn" onclick="document.getElementById('img-input').click()">사진 추가</button>
        <button class="btn" onclick="saveData()">파일로 저장</button>
        <button class="btn" onclick="document.getElementById('import-input').click()">파일 불러오기</button>
    </div>
    <input type="file" id="img-input" style="display:none" accept="image/*">
    <input type="file" id="import-input" style="display:none" accept=".txt">
    <div id="friend-list"></div>

    <script>
        // 에러 방지용 방어막
        let myData = [];
        try {
            const saved = localStorage.getItem('my_class_data');
            myData = saved ? JSON.parse(saved) : [];
        } catch(e) { myData = []; }

        function render() {
            const list = document.getElementById('friend-list');
            list.innerHTML = '';
            myData.forEach((item, idx) => {
                let div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<img src="${item.photo}" style="width:120px; height:120px; object-fit:cover;"><p>${item.name}</p>`;
                list.appendChild(div);
            });
        }

        document.getElementById('img-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const name = prompt("이름을 입력하세요");
                if(name) {
                    myData.push({name: name, photo: ev.target.result});
                    localStorage.setItem('my_class_data', JSON.stringify(myData));
                    render();
                }
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function saveData() {
            const blob = new Blob([JSON.stringify(myData)], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'my_class.txt';
            a.click();
        }

        document.getElementById('import-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    myData = JSON.parse(ev.target.result);
                    localStorage.setItem('my_class_data', JSON.stringify(myData));
                    render();
                    alert("불러오기 성공!");
                } catch(e) { alert("파일 오류입니다."); }
            };
            reader.readAsText(e.target.files[0]);
        };

        render();
    </script>
</body>
</html>
