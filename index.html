<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>초롱 한글 블록</title>
    <style>
        body { background: #fdfdfd; margin: 0; overflow: hidden; touch-action: none; font-family: 'Apple SD Gothic Neo', sans-serif; display: flex; flex-direction: column; align-items: center; }
        .menu-wrapper { width: 100%; display: flex; justify-content: center; gap: 10px; padding: 20px; background: #fff; z-index: 1001; }
        .btn-menu { padding: 10px 20px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; color: white; }
        
        /* 기존 스타일 그대로 */
        #start-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #f5f7fa; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; overflow-y: auto; padding-top: 40px; box-sizing: border-box; }
        #start-screen h1 { font-size: 40px; color: #333; margin-bottom: 20px; font-weight: 900; }
        .start-btn-group { display: flex; gap: 15px; margin-bottom: 20px; }
        .btn-add-friend { background: #34C759; color: white; padding: 15px 30px; font-size: 20px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; }
        .btn-direct-input { background: #007AFF; color: white; padding: 15px 30px; font-size: 20px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; }
        
        .friend-list { display: flex; gap: 25px; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .friend-card { width: 180px; background: white; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); padding: 15px; text-align: center; cursor: pointer; position: relative; }
        .friend-card img { width: 150px; height: 150px; border-radius: 15px; object-fit: cover; background: #eee; margin-bottom: 12px; }
        .btn-delete-card { position: absolute; top: -10px; right: -10px; width: 32px; height: 32px; background: #FF3B30; color: white; border-radius: 50%; border: none; font-size: 18px; cursor: pointer; }
        
        /* 게임 로직 관련 스타일도 그대로 유지 */
        #menu { margin-top: 20px; display: flex; gap: 10px; align-items: center; z-index: 100; }
        #drop-zone { display: flex; gap: 30px; margin-top: 40px; min-height: 300px; }
        .char-box { width: 250px; height: 250px; border: 4px solid #f0f0f0; background: white; position: relative; border-radius: 30px; display: flex; align-items: center; justify-content: center; }
        .char-box::before { content: attr(data-hint); font-size: 140px; font-weight: 900; color: #ebebeb; position: absolute; z-index: 1; }
        .jamo { position: absolute; font-size: 100px; font-weight: 900; color: #444; cursor: grab; z-index: 50; }
        .jamo.in-box { color: #007AFF; z-index: 40; }
        #bin { width: 100%; height: 200px; background: #f2f2f2; border-top: 3px solid #ddd; position: fixed; bottom: 0; display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; box-sizing: border-box; z-index: 90; }
        .jamo.ready { position: static; font-size: 80px; background: white; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 10px 20px; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>🎒 초롱 한글 블록</h1>
        <div class="menu-wrapper">
            <button class="btn-menu" style="background:#FF9500" onclick="addFolder()">반 추가</button>
            <button class="btn-menu" style="background:#5856D6" onclick="exportData()">데이터 내보내기</button>
            <button class="btn-menu" style="background:#8E8E93" onclick="document.getElementById('file-input-data').click()">파일 불러오기</button>
        </div>
        <input type="file" id="file-input-data" style="display:none" accept=".txt">

        <div id="folder-list" class="friend-list"></div>
        <div class="start-btn-group" id="friend-controls" style="display:none;">
            <button class="btn-add-friend" onclick="triggeraddFriend()">📸 사진 추가</button>
            <button class="btn-direct-input" onclick="triggerDirectInput()">✏️ 직접 쓰기</button>
        </div>
        <input type="file" id="file-input" accept="image/*" style="display:none">
        <div class="friend-list" id="friend-list"></div>
    </div>

    <div id="menu">
        <button class="btn" style="background:#aeaeae;" onclick="goHome()">🏠 처음으로</button>
        <button class="btn" style="background:#ffcc00;" onclick="resetGame()">♻️ 다시하기</button>
        <div id="hint" style="font-size:30px; font-weight:900;"></div>
    </div>
    <div id="drop-zone"></div>
    <div id="bin"></div>

    <script>
        // 데이터 구조: { "햇살반": [친구들], "바다반": [친구들] }
        let allClasses = JSON.parse(localStorage.getItem('chorong_data') || '{"우리반": []}');
        let currentClass = "우리반";

        function renderFolders() {
            const folderList = document.getElementById('folder-list');
            folderList.innerHTML = '';
            Object.keys(allClasses).forEach(className => {
                const card = document.createElement('div');
                card.className = 'friend-card';
                card.style.background = "#FFCC00";
                card.innerHTML = `<div style="font-size:50px">📁</div><span>${className}</span>`;
                card.onclick = () => { currentClass = className; showFriends(); };
                folderList.appendChild(card);
            });
        }

        function addFolder() {
            const name = prompt("새 반 이름을 입력하세요:");
            if(name) { allClasses[name] = []; save(); renderFolders(); }
        }

        function showFriends() {
            document.getElementById('folder-list').style.display = 'none';
            document.getElementById('friend-controls').style.display = 'flex';
            renderFriends();
        }

        function renderFriends() {
            const friendListDiv = document.getElementById('friend-list');
            friendListDiv.innerHTML = '';
            allClasses[currentClass].forEach((friend, index) => {
                const card = document.createElement('div');
                card.className = 'friend-card';
                card.innerHTML = `<img src="${friend.photo}"><span>${friend.name}</span>`;
                card.onclick = () => selectFriend(friend.name, friend.photo);
                friendListDiv.appendChild(card);
            });
        }

        // 선생님의 기존 기능들 복구 (이 아래는 선생님 코드를 그대로 넣으시면 됩니다)
        function save() { localStorage.setItem('chorong_data', JSON.stringify(allClasses)); }
        
        function exportData() {
            const blob = new Blob([JSON.stringify(allClasses)], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = '초롱한글블록_데이터.txt';
            a.click();
        }

        document.getElementById('file-input-data').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                allClasses = JSON.parse(ev.target.result);
                save();
                renderFolders();
            };
            reader.readAsText(e.target.files[0]);
        };

        // 게임 로직 연결은 선생님이 처음에 주신 함수들을 이 아래에 붙여넣기만 하면 됩니다.
        renderFolders();
    </script>
</body>
</html>
