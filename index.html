<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>한글 블록</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #fff; }
        .btn { padding: 15px; margin: 10px; background: #eee; border: none; border-radius: 10px; font-weight: bold; }
        #list { display: flex; flex-wrap: wrap; justify-content: center; }
    </style>
</head>
<body>
    <h1>우리 반 친구들</h1>
    <div id="btn-area">
        <button class="btn" onclick="document.getElementById('img-input').click()">사진 추가</button>
        <button class="btn" onclick="saveToDevice()">파일로 저장</button>
    </div>
    <input type="file" id="img-input" style="display:none" accept="image/*">
    <div id="list"></div>
    <script>
        // 1. 하얀 화면 방지: 데이터가 없으면 빈 값으로 시작
        let data = JSON.parse(localStorage.getItem('my_class') || '[]');
        
        // 2. 사진 추가 기능
        document.getElementById('img-input').onchange = (e) => {
            let file = e.target.files[0];
            let reader = new FileReader();
            reader.onload = (ev) => {
                let name = prompt("이름을 입력하세요");
                if(!name) return;
                data.push({name: name, photo: ev.target.result});
                localStorage.setItem('my_class', JSON.stringify(data));
                render();
            };
            reader.readAsDataURL(file);
        };

        // 3. 파일 저장 기능 (카톡 전송용)
        function saveToDevice() {
            let blob = new Blob([JSON.stringify(data)], {type: 'text/plain'});
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'class_data.txt';
            a.click();
        }

        // 4. 화면 그리기
        function render() {
            let list = document.getElementById('list');
            list.innerHTML = '';
            data.forEach((item, idx) => {
                let div = document.createElement('div');
                div.innerHTML = `<img src="${item.photo}" style="width:100px; height:100px;"><p>${item.name}</p>`;
                list.appendChild(div);
            });
        }
        render();
    </script>
</body>
</html>
