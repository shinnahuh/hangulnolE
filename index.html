<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>초롱유치원 한글 블록</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; background: #fdfdfd; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
        .btn { padding: 15px 25px; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; color: white; margin: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .folder-card { width: 160px; height: 140px; background: #FFCC00; border-radius: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 8px 15px rgba(255, 204, 0, 0.3); }
        .card-img { width: 120px; height: 120px; object-fit: cover; border-radius: 20px; }
        #list { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
    </style>
</head>
<body>
    <h1>📂 우리 반 한글 놀이</h1>
    <div id="controls">
        <button class="btn" style="background:#34C759" onclick="addFolder()">➕ 반 추가</button>
        <button class="btn" style="background:#FF9500" onclick="saveData()">💾 저장</button>
        <button class="btn" style="background:#5856D6" onclick="document.getElementById('file-in').click()">📂 불러오기</button>
    </div>
    <input type="file" id="file-in" style="display:none" accept=".txt">
    <div id="list"></div>

    <script>
        // 1. 방어막: 데이터 로드 (에러 나도 절대 멈추지 않음)
        let totalData = {};
        try {
            totalData = JSON.parse(localStorage.getItem('my_class_data') || '{}');
        } catch(e) { totalData = {}; }

        // 2. 반 추가
        function addFolder() {
            let name = prompt("반 이름을 입력하세요");
            if(name) { totalData[name] = []; saveToStorage(); render(); }
        }

        // 3. 화면 그리기 (귀여운 폴더들)
        function render() {
            const list = document.getElementById('list');
            list.innerHTML = '';
            Object.keys(totalData).forEach(name => {
                let div = document.createElement('div');
                div.className = 'folder-card';
                div.innerHTML = `<div style="font-size:40px">📁</div><div>${name}</div>`;
                div.onclick = () => showFriends(name);
                list.appendChild(div);
            });
        }

        // 4. 저장 (메모리+파일)
        function saveToStorage() { localStorage.setItem('my_class_data', JSON.stringify(totalData)); }
        function saveData() {
            const blob = new Blob([JSON.stringify(totalData)], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'my_class.txt';
            a.click();
        }

        // 5. 불러오기
        document.getElementById('file-in').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    totalData = JSON.parse(ev.target.result);
                    saveToStorage();
                    render();
                } catch(e) { alert("파일이 깨졌습니다."); }
            };
            reader.readAsText(e.target.files[0]);
        };

        render();
    </script>
</body>
</html>
