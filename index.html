<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>초롱 한글 블록</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; display: flex; flex-direction: column; align-items: center; background: #fdfdfd; margin: 0; padding: 20px; }
        h1 { color: #333; margin-bottom: 20px; }
        .menu-bar { display: flex; gap: 10px; margin-bottom: 30px; }
        .btn { padding: 15px 20px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .btn-1 { background: #34C759; } /* 반 폴더 추가 */
        .btn-2 { background: #007AFF; } /* 직접 쓰기 */
        .btn-3 { background: #FF9500; } /* 데이터 내보내기 */
        .btn-4 { background: #5856D6; } /* 파일 불러오기 */
        
        #list { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .folder-card { width: 160px; height: 140px; background: #FFCC00; border-radius: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 5px 10px rgba(255, 204, 0, 0.3); }
        
        /* 게임 영역 */
        #game-view { display: none; width: 100%; flex-direction: column; align-items: center; }
    </style>
</head>
<body>
    <h1>초롱 한글 블록</h1>
    
    <div class="menu-bar">
        <button class="btn btn-1" onclick="addFolder()">반 폴더 추가</button>
        <button class="btn btn-2" onclick="goDirect()">직접 쓰기</button>
        <button class="btn btn-3" onclick="exportData()">데이터 내보내기</button>
        <button class="btn btn-4" onclick="document.getElementById('file-in').click()">파일 불러오기</button>
    </div>
    <input type="file" id="file-in" style="display:none" accept=".txt">

    <div id="list"></div>
    <div id="game-view">
        <button class="btn" onclick="location.reload()">🏠 홈으로</button>
        <div id="drop-zone" style="display:flex; gap:10px; margin:20px;"></div>
        <div id="bin" style="display:flex; gap:10px; flex-wrap:wrap; margin-top:20px;"></div>
    </div>

    <script>
        // 안전한 데이터 로딩 (백화현상 방지)
        let totalData = {};
        try {
            totalData = JSON.parse(localStorage.getItem('my_class_data') || '{}');
        } catch(e) { totalData = {}; }

        function renderFolders() {
            const list = document.getElementById('list');
            list.innerHTML = '';
            Object.keys(totalData).forEach(name => {
                let div = document.createElement('div');
                div.className = 'folder-card';
                div.innerHTML = `<div style="font-size:40px">📁</div><div>${name}</div>`;
                div.onclick = () => { /* 게임 진입 로직 */ alert(name + " 반 진입"); };
                list.appendChild(div);
            });
        }

        function addFolder() {
            let name = prompt("새 반 이름을 입력하세요");
            if(name) { totalData[name] = []; localStorage.setItem('my_class_data', JSON.stringify(totalData)); renderFolders(); }
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(totalData)], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = '초롱한글블록_데이터.txt';
            a.click();
        }

        document.getElementById('file-in').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    totalData = JSON.parse(ev.target.result);
                    localStorage.setItem('my_class_data', JSON.stringify(totalData));
                    renderFolders();
                } catch(e) { alert("파일을 읽을 수 없습니다."); }
            };
            reader.readAsText(e.target.files[0]);
        };

        renderFolders();
    </script>
</body>
</html>
