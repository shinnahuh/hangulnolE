<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>초롱유치원 한글 놀이</title>
    <style>
        body { background: #fdfdfd; margin: 0; overflow: hidden; touch-action: none; font-family: 'Apple SD Gothic Neo', sans-serif; display: flex; flex-direction: column; align-items: center; }
        #start-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #f5f7fa; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; overflow-y: auto; padding-top: 40px; box-sizing: border-box; }
        #start-screen h1 { font-size: 40px; color: #333; margin-bottom: 20px; font-weight: 900; }
        .start-btn-group { display: flex; gap: 15px; margin-bottom: 20px; }
        .btn-add-friend { background: #34C759; color: white; padding: 12px 24px; font-size: 18px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(52, 199, 89, 0.3); }
        .btn-direct-input { background: #007AFF; color: white; padding: 12px 24px; font-size: 18px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0, 122, 255, 0.3); }
        .friend-list { display: flex; gap: 25px; flex-wrap: wrap; justify-content: center; max-width: 1100px; padding: 20px; padding-bottom: 100px; }
        .friend-card { width: 180px; background: white; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); padding: 15px; text-align: center; cursor: pointer; transition: transform 0.2s; border: 3px solid transparent; position: relative; }
        .friend-card:hover { transform: scale(1.05); border-color: #007AFF; }
        .friend-card img { width: 140px; height: 140px; border-radius: 15px; object-fit: cover; background: #eee; margin-bottom: 10px; }
        .friend-card span { font-size: 24px; font-weight: 800; color: #333; }
        .btn-delete-card { position: absolute; top: -10px; right: -10px; width: 30px; height: 30px; background: #FF3B30; color: white; border-radius: 50%; border: none; font-weight: bold; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        #menu { margin-top: 20px; display: flex; gap: 10px; align-items: center; z-index: 100; }
        #hint-box { display: flex; align-items: center; gap: 15px; background: #fff; padding: 10px 30px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        #current-photo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; display: none; background: #eee; }
        #hint { font-size: 40px; font-weight: 900; color: #333; letter-spacing: 10px; }
        .btn { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); }
        .btn-reset { background: #ffcc00; color: #333; }
        .btn-change { background: #007AFF; color: white; }
        .btn-home { background: #aeaeae; color: white; }
        #drop-zone { display: flex; gap: 30px; margin-top: 40px; min-height: 300px; }
        .char-box { width: 250px; height: 250px; border: 4px solid #f0f0f0; background: white; position: relative; border-radius: 30px; }
        .jamo { position: absolute; font-size: 100px; font-weight: 900; color: #444; cursor: grab; user-select: none; line-height: 1; z-index: 50; padding: 10px; }
        .jamo.in-box { color: #007AFF; z-index: 40; }
        #bin { width: 100%; height: 200px; background: #f9f9f9; border-top: 2px solid #eee; position: fixed; bottom: 0; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 15px; padding: 20px; }
        .jamo.ready { position: static; font-size: 80px; background: white; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        #logo { position: fixed; bottom: 20px; right: 20px; width: 150px; height: auto; opacity: 0.8; pointer-events: none; }
        #file-input { display: none; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>누구 이름을 만들어볼까?</h1>
        <div class="start-btn-group">
            <button class="btn-add-friend" onclick="triggeraddFriend()">➕ 새 친구 추가하기</button>
            <button class="btn-direct-input" onclick="triggerDirectInput()">✏️ 글자 직접 입력하기</button>
        </div>
        <input type="file" id="file-input" accept="image/*" capture="user">
        <div class="friend-list" id="friend-list"></div>
    </div>

    <div id="menu">
        <button class="btn btn-home" onclick="goHome()">🏠 처음으로</button>
        <button class="btn btn-reset" onclick="resetGame()">♻️ 다시하기</button>
        <div id="hint-box">
            <img id="current-photo" src="" alt="친구 사진">
            <div id="hint">이름</div>
        </div>
        <button class="btn btn-change" onclick="changeName()">✏️ 직접 쓰기</button>
    </div>

    <div id="drop-zone"></div>
    <div id="bin"></div>

    <img src="로고.png" id="logo" alt="초롱유치원 로고">

    <script>
        let defaultNames = [
            "강예린", "김겨울", "김다현", "김유나", "김지율", 
            "박지욱", "박채이", "배소이", "서이하진", "안서율", 
            "양다인", "이설아", "이채원", "정유준", "조이준", 
            "조해든", "최건우", "홍시헌", "허신나", "이나연"
        ];

        let friendsData = [];

        // 💡 경로 에러를 해결하기 위해 파일명 주소 앞에 온점과 슬래시(./)를 강제로 붙여 현재 폴더 안을 찌르게 수정했습니다!
        defaultNames.forEach(name => {
            friendsData.push({ name: name, photo: "./" + name + ".png", altPhoto: "./" + name + ".PNG" });
        });

        if (localStorage.getItem('chorong_custom_friends')) {
            const custom = JSON.parse(localStorage.getItem('chorong_custom_friends'));
            friendsData = friendsData.concat(custom);
        }

        let currentName = "";
        let currentPhoto = "";
        
        const startScreen = document.getElementById('start-screen');
        const friendListDiv = document.getElementById('friend-list');
        const dropZone = document.getElementById('drop-zone');
        const bin = document.getElementById('bin');
        const hint = document.getElementById('hint');
        const currentPhotoImg = document.getElementById('current-photo');
        const fileInput = document.getElementById('file-input');

        function makeStartScreen() {
            friendListDiv.innerHTML = '';
            
            friendsData.forEach((friend, index) => {
                const card = document.createElement('div');
                card.className = 'friend-card';
                card.onclick = (e) => {
                    if(e.target.className === 'btn-delete-card') return;
                    selectFriend(friend.name, friend.photo);
                };
                
                const img = document.createElement('img');
                const defaultAvatar = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23ddd'/><text x='50%' y='55%' font-size='40' font-weight='bold' text-anchor='middle' fill='%23aaa'>👤</text></svg>";
                
                img.src = friend.photo || defaultAvatar;
                
                img.onerror = () => { 
                    if (friend.altPhoto && img.src !== window.location.origin + window.location.pathname + friend.altPhoto) {
                        img.src = friend.altPhoto;
                    } else {
                        img.src = defaultAvatar; 
                    }
                };
                
                const span = document.createElement('span');
                span.innerText = friend.name;
                
                const delBtn = document.createElement('button');
                delBtn.className = 'btn-delete-card';
                delBtn.innerText = 'X';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    if(confirm(`${friend.name} 친구를 목록에서 숨길까요?`)) {
                        if (index >= 20) {
                            const customIndex = index - 20;
                            let customFriends = JSON.parse(localStorage.getItem('chorong_custom_friends')) || [];
                            customFriends.splice(customIndex, 1);
                            localStorage.setItem('chorong_custom_friends', JSON.stringify(customFriends));
                        }
                        friendsData.splice(index, 1);
                        makeStartScreen();
                    }
                };
                
                card.appendChild(delBtn);
                card.appendChild(img);
                card.appendChild(span);
                friendListDiv.appendChild(card);
            });
        }

        function triggeraddFriend() {
            const friendName = prompt("추가할 친구의 이름을 적어주세요:");
            if (!friendName) return;

            fileInput.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        let customFriends = JSON.parse(localStorage.getItem('chorong_custom_friends')) || [];
                        const newFriend = { name: friendName, photo: event.target.result };
                        customFriends.push(newFriend);
                        localStorage.setItem('chorong_custom_friends', JSON.stringify(customFriends));
                        friendsData.push(newFriend);
                        makeStartScreen();
                    };
                    reader.readAsDataURL(file);
                } else {
                    let customFriends = JSON.parse(localStorage.getItem('chorong_custom_friends')) || [];
                    const newFriend = { name: friendName, photo: "" };
                    customFriends.push(newFriend);
                    localStorage.setItem('chorong_custom_friends', JSON.stringify(customFriends));
                    friendsData.push(newFriend);
                    makeStartScreen();
                }
            };
            fileInput.click();
        }

        function triggerDirectInput() {
            const directName = prompt("만들고 싶은 글자나 이름을 입력하세요:");
            if (directName) {
                startScreen.style.display = 'none';
                currentPhoto = ""; 
                initGame(directName);
            }
        }

        function selectFriend(name, photo) {
            startScreen.style.display = 'none';
            currentPhoto = photo;
            initGame(name);
        }

        // 💡 게임 내 상단 로고 이미지 주소도 똑같이 해결
        document.getElementById('logo').src = "./로고.png";

        function goHome() { startScreen.style.display = 'flex'; }

        function getJamoList(word) {
            const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
            const jung = ["ㅏ","ㅐ","ㅑ","ㅒ","ㅓ","ㅔ","ㅕ","ㅖ","ㅗ","ㅘ","ㅙ","ㅚ","ㅛ","ㅜ","ㅝ","ㅞ","ㅟ","ㅠ","ㅡ","ㅢ","ㅣ"];
            const jong = ["","ㄱ","ㄲ","ㄳ","ㄴ","ㄵ","ㄶ","ㄷ","ㄹ","ㄺ","¼","ㄼ","ㄽ","ㄾ","ㄿ","ㅀ","ㅁ","ㅂ","ㅄ","ㅅ","ㅆ","ㅇ","ㅈ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
            const list = [];
            for (let i = 0; i < word.length; i++) {
                const code = word.charCodeAt(i) - 44032;
                if (code < 0 || code > 11171) continue;
                list.push({ text: cho[Math.floor(code / 588)] });
                list.push({ text: jung[Math.floor((code % 588) / 28)] });
                if (code % 28 !== 0) list.push({ text: jong[code % 28] });
            }
            return list;
        }

        function initGame(newName) {
            currentName = newName;
            hint.innerText = currentName;
            
            if(currentPhoto) {
                currentPhotoImg.src = currentPhoto;
                currentPhotoImg.style.display = 'block';
                currentPhotoImg.onerror = () => { 
                    const altPath = "./" + currentName + ".PNG";
                    if(currentPhotoImg.src !== window.location.origin + window.location.pathname + altPath) {
                        currentPhotoImg.src = altPath;
                    } else {
                        currentPhotoImg.style.display = 'none';
                    }
                };
            } else {
                currentPhotoImg.style.display = 'none';
            }

            dropZone.innerHTML = '';
            bin.innerHTML = '';
            for(let i=0; i<currentName.length; i++) {
                const box = document.createElement('div');
                box.className = 'char-box';
                dropZone.appendChild(box);
            }
            const pieces = getJamoList(currentName).sort(() => Math.random() - 0.5);
            pieces.forEach(p => createPiece(p.text));
        }

        function createPiece(text) {
            const el = document.createElement('div');
            el.className = 'jamo ready';
            el.innerText = text;
            bin.appendChild(el);

            let ox, oy;
            const start = (e) => {
                const ev = e.touches ? e.touches[0] : e;
                const rect = el.getBoundingClientRect();
                el.classList.remove('ready', 'in-box');
                el.style.color = '#444';
                el.style.position = 'fixed';
                el.style.left = rect.left + 'px';
                el.style.top = rect.top + 'px';
                el.style.fontSize = '120px';
                document.body.appendChild(el);
                ox = ev.clientX - el.offsetLeft;
                oy = ev.clientY - el.offsetTop;

                const move = (me) => {
                    const mev = me.touches ? me.touches[0] : me;
                    el.style.left = (mev.clientX - ox) + 'px';
                    el.style.top = (mev.clientY - oy) + 'px';
                };

                const stop = () => {
                    window.removeEventListener('mousemove', move);
                    window.removeEventListener('mouseup', stop);
                    window.removeEventListener('touchmove', move);
                    window.removeEventListener('touchend', stop);
                    let placed = false;
                    const boxes = document.getElementsByClassName('char-box');
                    for (let box of boxes) {
                        const bRect = box.getBoundingClientRect();
                        const eRect = el.getBoundingClientRect();
                        if (eRect.left < bRect.right && eRect.right > bRect.left &&
                            eRect.top < bRect.bottom && eRect.bottom > bRect.top) {
                            box.appendChild(el);
                            el.style.position = 'absolute';
                            el.style.left = (eRect.left - bRect.left) + 'px';
                            el.style.top = (eRect.top - bRect.top) + 'px';
                            el.classList.add('in-box');
                            placed = true;
                            break;
                        }
                    }
                    if (!placed) {
                        el.classList.add('ready');
                        el.style.position = 'static';
                        el.style.fontSize = '80px';
                        bin.appendChild(el);
                    }
                };
                window.addEventListener('mousemove', move);
                window.addEventListener('mouseup', stop);
                window.addEventListener('touchmove', move, {passive:false});
                window.addEventListener('touchend', stop);
            };
            el.addEventListener('mousedown', start);
            el.addEventListener('touchstart', start, {passive:false});
        }

        function resetGame() { initGame(currentName); }
        
        function changeName() {
            const next = prompt("새로운 이름을 입력하세요", currentName);
            if (next) {
                currentPhoto = ""; 
                initGame(next);
            }
        }

        makeStartScreen();
    </script>
</body>
</html>
