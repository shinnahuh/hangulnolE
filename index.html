<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>초롱유치원 한글 놀이</title>
    <style>
        body { background: #fdfdfd; margin: 0; overflow: hidden; touch-action: none; font-family: 'Apple SD Gothic Neo', sans-serif; display: flex; flex-direction: column; align-items: center; }
        
        #start-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #f5f7fa; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; overflow-y: auto; padding-top: 40px; box-sizing: border-box; }
        #start-screen h1 { font-size: 40px; color: #333; margin-bottom: 20px; font-weight: 900; }
        
        .start-btn-group { display: flex; gap: 15px; margin-bottom: 20px; }
        .btn-add-friend { background: #34C759; color: white; padding: 15px 30px; font-size: 20px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(52, 199, 89, 0.3); }
        .btn-direct-input { background: #007AFF; color: white; padding: 15px 30px; font-size: 20px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0, 122, 255, 0.3); }
        
        .friend-list { display: flex; gap: 25px; flex-wrap: wrap; justify-content: center; max-width: 1100px; padding: 20px; padding-bottom: 100px; }
        .friend-card { width: 180px; background: white; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); padding: 15px; text-align: center; cursor: pointer; transition: transform 0.2s; border: 3px solid transparent; position: relative; display: flex; flex-direction: column; align-items: center; }
        .friend-card:hover { transform: scale(1.05); border-color: #007AFF; }
        .friend-card img { width: 150px; height: 150px; border-radius: 15px; object-fit: cover; background: #eee; margin-bottom: 12px; }
        .friend-card span { font-size: 24px; font-weight: 800; color: #333; display: block; width: 100%; text-align: center; white-space: nowrap; }
        
        .btn-delete-card { position: absolute; top: -10px; right: -10px; width: 32px; height: 32px; background: #FF3B30; color: white; border-radius: 50%; border: none; font-weight: bold; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.2); z-index: 10; }
        
        #menu { margin-top: 20px; display: flex; gap: 10px; align-items: center; z-index: 100; }
        #hint-box { display: flex; align-items: center; gap: 15px; background: #fff; padding: 10px 30px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        #current-photo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; display: none; background: #eee; }
        #hint { font-size: 40px; font-weight: 900; color: #333; letter-spacing: 10px; }
        .btn { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); }
        .btn-reset { background: #ffcc00; color: #333; }
        .btn-change { background: #007AFF; color: white; }
        .btn-home { background: #aeaeae; color: white; }
        
        #drop-zone { display: flex; gap: 30px; margin-top: 40px; min-height: 300px; }
        .char-box { width: 250px; height: 250px; border: 4px solid #f0f0f0; background: white; position: relative; border-radius: 30px; display: flex; align-items: center; justify-content: center; }
        .char-box::before { content: attr(data-hint); font-size: 140px; font-weight: 900; color: #ebebeb; position: absolute; z-index: 1; user-select: none; pointer-events: none; }
        .jamo { position: absolute; font-size: 100px; font-weight: 900; color: #444; cursor: grab; user-select: none; line-height: 1; z-index: 50; padding: 10px; }
        .jamo.in-box { color: #007AFF; z-index: 40; }
        #bin { width: 100%; height: 200px; background: #f2f2f2; border-top: 3px solid #ddd; position: fixed; bottom: 0; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 15px; padding: 20px; box-sizing: border-box; z-index: 90; }
        .jamo.ready { position: static; font-size: 80px; background: white; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 10px 20px; }
        #file-input { display: none; }
        
        /* 폴더용 스타일 추가 */
        .folder-btn-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-folder { background: #FF9500; color: white; padding: 10px 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 id="screen-title">🎒 초롱유치원 한글 놀이</h1>
        
        <div id="folder-menu" class="folder-btn-container">
            <button class="btn-folder" onclick="addFolder()">➕ 반 추가</button>
            <button class="btn-folder" style="background:#5856D6" onclick="exportData()">💾 내보내기</button>
            <button class="btn-folder" style="background:#8E8E93" onclick="document.getElementById('file-in').click()">📂 불러오기</button>
        </div>
        <input type="file" id="file-in" style="display:none" accept=".txt">

        <div class="start-btn-group" id="friend-controls" style="display:none;">
            <button class="btn-add-friend" onclick="triggeraddFriend()">📸 사진 추가</button>
            <button class="btn-direct-input" onclick="triggerDirectInput()">✏️ 직접 쓰기</button>
        </div>
        
        <div class="friend-list" id="friend-list"></div>
    </div>

    <div id="menu">
        <button class="btn btn-home" onclick="goHome()">🏠 홈으로</button>
        <button class="btn btn-reset" onclick="resetGame()">♻️ 다시하기</button>
        <div id="hint-box">
            <img id="current-photo" src="" alt="친구 사진">
            <div id="hint">이름</div>
        </div>
        <button class="btn btn-change" onclick="changeName()">✏️ 직접 쓰기</button>
    </div>

    <div id="drop-zone"></div>
    <div id="bin"></div>

    <script>
        // 데이터 저장소: { "반이름": [친구들], ... }
        let allData = JSON.parse(localStorage.getItem('chorong_all_data') || '{"우리반": []}');
        let currentClass = ""; // 현재 선택된 반

        // 1. 초기 화면: 반 목록 보여주기
        function makeStartScreen() {
            document.getElementById('screen-title').innerText = "📂 반을 선택하세요";
            document.getElementById('friend-controls').style.display = 'none';
            const list = document.getElementById('friend-list');
            list.innerHTML = '';
            
            Object.keys(allData).forEach(className => {
                const card = document.createElement('div');
                card.className = 'friend-card';
                card.style.background = "#FFCC00";
                card.innerHTML = `<div style="font-size:50px">📁</div><span>${className}</span>`;
                card.onclick = () => { currentClass = className; showFriends(); };
                list.appendChild(card);
            });
        }

        function showFriends() {
            document.getElementById('screen-title').innerText = `🎒 ${currentClass} 친구들`;
            document.getElementById('friend-controls').style.display = 'flex';
            const list = document.getElementById('friend-list');
            list.innerHTML = '';
            
            allData[currentClass].forEach((friend, index) => {
                const card = document.createElement('div');
                card.className = 'friend-card';
                card.onclick = (e) => { if(e.target.className !== 'btn-delete-card') selectFriend(friend.name, friend.photo); };
                const img = document.createElement('img'); img.src = friend.photo;
                const span = document.createElement('span'); span.innerText = friend.name;
                const delBtn = document.createElement('button');
                delBtn.className = 'btn-delete-card'; delBtn.innerText = 'X';
                delBtn.onclick = (e) => { e.stopPropagation(); if(confirm("삭제할까요?")) { allData[currentClass].splice(index, 1); save(); showFriends(); } };
                card.appendChild(delBtn); card.appendChild(img); card.appendChild(span);
                list.appendChild(card);
            });
        }

        function addFolder() {
            const name = prompt("새 반 이름을 입력하세요:");
            if(name) { allData[name] = []; save(); makeStartScreen(); }
        }

        // 선생님의 기존 기능들 복구
        function save() { localStorage.setItem('chorong_all_data', JSON.stringify(allData)); }
        
        function exportData() {
            const blob = new Blob([JSON.stringify(allData)], {type: 'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = '초롱한글블록_데이터.txt';
            a.click();
        }

        document.getElementById('file-in').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => { allData = JSON.parse(ev.target.result); save(); makeStartScreen(); };
            reader.readAsText(e.target.files[0]);
        };

        function triggeraddFriend() {
            const friendName = prompt("친구 이름:");
            if(!friendName) return;
            const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
            input.onchange = (e) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    allData[currentClass].push({name: friendName, photo: ev.target.result});
                    save(); showFriends();
                };
                reader.readAsDataURL(e.target.files[0]);
            };
            input.click();
        }

        // 게임 로직 연결
        function selectFriend(name, photo) {
            document.getElementById('start-screen').style.display = 'none';
            currentPhoto = photo;
            initGame(name);
        }

        function goHome() { 
            document.getElementById('start-screen').style.display = 'flex'; 
            makeStartScreen(); 
        }

        // 선생님의 게임 로직(initGame, getJamoList, createPiece 등)은 
        // 그대로 유지되므로 아래에 선생님 코드를 그대로 붙여넣으세요.
    </script>
</body>
</html>
