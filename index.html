<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>초롱유치원 한글 놀이</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #fdfdfd; margin: 0; }
        .btn-game { padding: 15px 20px; margin: 5px; background: #FFCC00; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; }
        #friend-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .card { border: 1px solid #eee; padding: 15px; border-radius: 20px; text-align: center; background: white; cursor: pointer; width: 150px; }
        #game-area { width: 100%; display: none; }
        .drop-zone { display: flex; gap: 20px; justify-content: center; margin: 30px; }
        .char-box { width: 150px; height: 150px; border: 4px solid #ddd; border-radius: 20px; display: flex; align-items: center; justify-content: center; position: relative; }
        .jamo { position: absolute; font-size: 80px; font-weight: 900; cursor: grab; }
        #bin { height: 150px; background: #eee; display: flex; justify-content: center; align-items: center; gap: 10px; }
    </style>
</head>
<body>
    <div id="home-view">
        <h1>우리 반 한글 놀이</h1>
        <button class="btn-game" onclick="document.getElementById('img-input').click()">📸 사진 추가</button>
        <button class="btn-game" onclick="saveData()">💾 저장</button>
        <input type="file" id="img-input" style="display:none" accept="image/*">
        <div id="friend-list"></div>
    </div>

    <div id="game-area">
        <button class="btn-game" onclick="location.reload()">🏠 홈으로</button>
        <div id="target-name" style="font-size:30px; font-weight:bold;"></div>
        <div class="drop-zone" id="drop-zone"></div>
        <div id="bin"></div>
    </div>

    <script>
        let myData = JSON.parse(localStorage.getItem('my_class_data') || '[]');
        
        // 화면 그리기
        function render() {
            const list = document.getElementById('friend-list');
            list.innerHTML = '';
            myData.forEach((item, idx) => {
                let div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<img src="${item.photo}" style="width:120px; height:120px; object-fit:cover;"><p>${item.name}</p>`;
                div.onclick = () => startGame(item);
                list.appendChild(div);
            });
        }

        // 게임 시작
        function startGame(item) {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            document.getElementById('target-name').innerText = item.name;
            // 여기서 한글 분리 로직과 조립 UI를 그리게 됩니다.
            // (이후 블록 조립 로직 연결)
        }

        document.getElementById('img-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const name = prompt("이름을 입력하세요");
                if(name) {
                    myData.push({name: name, photo: ev.target.result});
                    localStorage.setItem('my_class_data', JSON.stringify(myData));
                    render();
                }
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        render();
    </script>
</body>
</html>
